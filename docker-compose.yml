services:
  minecraft:

    image: itzg/minecraft-server

    container_name: minecraft

    ports:
      - "25565:25565"

    environment:

      EULA: "TRUE"

      TYPE: "NEOFORGE"

      VERSION: "1.21.1"

      ONLINE_MODE: "false"

      MEMORY: "8G"

      TZ: "Europe/Berlin"

    volumes:

      - ./data:/data

    restart: unless-stopped
